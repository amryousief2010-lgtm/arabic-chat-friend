  <body>
    <div id="root"></div>
    <!-- 🧹 Kill-switch: يلغي أي Service Worker قديم ويمسح كل الكاشات قبل تحميل التطبيق -->
    <script>
      (function () {
        try {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              var hadSW = regs && regs.length > 0;
              Promise.all(regs.map(function (r) { return r.unregister(); })).then(function () {
                if ('caches' in window) {
                  caches.keys().then(function (keys) {
                    Promise.all(keys.map(function (k) { return caches.delete(k); })).then(function () {
                      // إذا وجدنا SW قديم فعلاً، أعد التحميل مرة واحدة بدون كاش
                      if (hadSW && !sessionStorage.getItem('sw-killed')) {
                        sessionStorage.setItem('sw-killed', '1');
                        window.location.reload();
                      } else {
                        sessionStorage.removeItem('sw-killed');
                      }
                    });
                  });
                }
              });
            });
          }
        } catch (e) { /* ignore */ }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
